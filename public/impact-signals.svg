<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Signals reviewed visual</title>
  <desc id="desc">A MachMemo operating impact graphic showing machine signals reviewed daily when connected.</desc>
  <defs>
    <linearGradient id="bg" x1="100" x2="1100" y1="80" y2="1120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071014"/>
      <stop offset="0.5" stop-color="#102f38"/>
      <stop offset="1" stop-color="#081014"/>
    </linearGradient>
    <radialGradient id="pulse" cx="50%" cy="52%" r="46%">
      <stop stop-color="#7fd8c7" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7fd8c7" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="32" stdDeviation="32" flood-color="#010608" flood-opacity="0.42"/>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.4" fill="#7fd8c7" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="1200" height="1200" rx="64" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#dots)"/>
  <circle cx="600" cy="620" r="420" fill="url(#pulse)"/>
  <g filter="url(#soft)">
    <rect x="164" y="150" width="872" height="205" rx="36" fill="#121f25" stroke="#31545c" stroke-width="3"/>
    <text x="220" y="247" fill="#effff9" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="850">2.4M</text>
    <text x="440" y="236" fill="#effff9" font-family="Inter, Arial, sans-serif" font-size="37" font-weight="800">signals reviewed daily</text>
    <text x="440" y="292" fill="#a8bbb9" font-family="Inter, Arial, sans-serif" font-size="30">when connected</text>
  </g>
  <g stroke="#7fd8c7" stroke-width="5" fill="none" opacity="0.85">
    <path d="M185 700c100-95 176-93 250-24s145 68 230-20 170-96 270-21"/>
    <path d="M200 790c92-70 150-64 230-3s142 64 218-16 174-80 312 12" opacity="0.56"/>
    <path d="M218 612c88-70 150-66 224-6s152 61 236-20 155-84 300 12" opacity="0.42"/>
  </g>
  <g fill="#8ff0d8">
    <circle cx="310" cy="676" r="12"/>
    <circle cx="493" cy="715" r="12"/>
    <circle cx="666" cy="656" r="12"/>
    <circle cx="872" cy="633" r="12"/>
    <circle cx="376" cy="792" r="9" opacity="0.7"/>
    <circle cx="612" cy="783" r="9" opacity="0.7"/>
    <circle cx="792" cy="736" r="9" opacity="0.7"/>
  </g>
  <g filter="url(#soft)">
    <rect x="355" y="455" width="490" height="200" rx="36" fill="#f7fbf8" stroke="#c2d9d2" stroke-width="3"/>
    <text x="410" y="535" fill="#14252a" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="850">SCADA + sensors</text>
    <text x="410" y="590" fill="#5d7377" font-family="Inter, Arial, sans-serif" font-size="28">normal range learned</text>
    <rect x="650" y="520" width="130" height="54" rx="27" fill="#dff5ec"/>
    <text x="685" y="556" fill="#147664" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850">LIVE</text>
  </g>
  <text x="600" y="1015" text-anchor="middle" fill="#effff9" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800">Signals become context, not noise.</text>
</svg>
