<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Technician throughput visual</title>
  <desc id="desc">A MachMemo operating impact graphic showing technician throughput increasing through guided fix cards.</desc>
  <defs>
    <linearGradient id="bg" x1="90" x2="1120" y1="80" y2="1130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1418"/>
      <stop offset="0.52" stop-color="#113037"/>
      <stop offset="1" stop-color="#091014"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="30" flood-color="#010608" flood-opacity="0.38"/>
    </filter>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1.6" fill="#7fd8c7" opacity="0.24"/>
    </pattern>
  </defs>
  <rect width="1200" height="1200" rx="64" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#dots)"/>
  <g filter="url(#soft)">
    <rect x="165" y="155" width="870" height="205" rx="36" fill="#121f25" stroke="#31545c" stroke-width="3"/>
    <text x="220" y="250" fill="#effff9" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="850">+18%</text>
    <text x="425" y="239" fill="#effff9" font-family="Inter, Arial, sans-serif" font-size="37" font-weight="800">technician throughput</text>
    <text x="425" y="294" fill="#a8bbb9" font-family="Inter, Arial, sans-serif" font-size="30">on common issues</text>
  </g>
  <g filter="url(#soft)">
    <rect x="185" y="440" width="830" height="470" rx="38" fill="#f7fbf8" stroke="#c2d9d2" stroke-width="3"/>
    <rect x="235" y="500" width="244" height="330" rx="28" fill="#e8f2ee"/>
    <rect x="505" y="500" width="244" height="330" rx="28" fill="#dff5ec"/>
    <rect x="775" y="500" width="190" height="330" rx="28" fill="#e8f2ee"/>
    <text x="277" y="565" fill="#14252a" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="800">Before</text>
    <text x="552" y="565" fill="#14252a" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="800">Guided fix</text>
    <text x="815" y="565" fill="#14252a" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="800">After</text>
    <path d="M285 690h146M285 742h114M285 794h156" stroke="#6d8184" stroke-width="15" stroke-linecap="round"/>
    <path d="M555 648h142M555 704h128M555 760h150" stroke="#147664" stroke-width="15" stroke-linecap="round"/>
    <path d="M830 680h88M830 732h88M830 784h88" stroke="#6d8184" stroke-width="15" stroke-linecap="round"/>
    <circle cx="626" cy="882" r="72" fill="#0d181d"/>
    <path d="M592 883l25 25 54-68" fill="none" stroke="#8ff0d8" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="600" y="1016" text-anchor="middle" fill="#effff9" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800">Less searching. More correct action.</text>
</svg>
